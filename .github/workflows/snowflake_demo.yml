name: Snowflake-github-action-demo

on:
  push:
    branches: 
      - master

jobs:
  snowflake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instal Snowflake CLI
        run: pip install snowflake-cli

      - name: Copy config
        env:
          SNOWFLAKE_PASSWORD: ${{secrets.SNOWFLAKE_PASSWORD}}
        run: |
              mkdir -p ~/.snowflake
              envsubst < .snowflake/config.toml > ~/.snowflake/config.toml
              chmod 600 ~/.snowflake/config.toml
      
      - name: insert SQL
        run: |
              snow sql \
              -c snowflake \
              -f sql/01_Insert.sql
      
      - name: query result
        run: |
              snow sql \
              -c snowflake \
              -f sql/02_Select.sql